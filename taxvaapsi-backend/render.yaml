services:
  - type: web
    name: taxvaapsi-backend
    env: python
    region: singapore
    plan: free
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 8080
    envVars:
      - key: AWS_REGION
        value: ap-south-1
      - key: DYNAMODB_TABLE_PREFIX
        value: taxvaapsi_
      - key: USE_LOCAL_DYNAMODB
        value: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
