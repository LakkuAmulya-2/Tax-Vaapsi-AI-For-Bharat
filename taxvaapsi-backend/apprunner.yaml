version: 1.0
runtime: python311
build:
  commands:
    build:
      - pip install -r requirements.txt
run:
  runtime-version: 3.11
  command: uvicorn main:app --host 0.0.0.0 --port 8080
  network:
    port: 8080
  env:
    - name: AWS_REGION
      value: ap-south-1
    - name: DYNAMODB_TABLE_PREFIX
      value: taxvaapsi_
    - name: USE_LOCAL_DYNAMODB
      value: "false"
