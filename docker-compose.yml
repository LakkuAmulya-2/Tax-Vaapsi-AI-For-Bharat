version: '3.8'

# ╔══════════════════════════════════════════════════════════════╗
# ║     TAX VAAPSI v3.0 — Full Stack Docker Compose             ║
# ║     Frontend (Next.js) + Backend (FastAPI) + Portals        ║
# ╚══════════════════════════════════════════════════════════════╝

services:
  # ── FRONTEND ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./taxvaapsi-frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8080
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8080
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - taxvaapsi

  # ── BACKEND (FastAPI) ─────────────────────────────────────────
  backend:
    build:
      context: ./taxvaapsi-backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - AWS_REGION=${AWS_REGION:-ap-south-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-demo}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-demo}
      - BEDROCK_MODEL_ID=amazon.nova-pro-v1:0
      - DYNAMODB_TABLE_PREFIX=taxvaapsi_
      - S3_BUCKET=${S3_BUCKET:-taxvaapsi-documents}
      - DEMO_MODE=${DEMO_MODE:-true}
    restart: unless-stopped
    networks:
      - taxvaapsi

  # ── GST PORTAL (Demo) ─────────────────────────────────────────
  gst-portal:
    build:
      context: ./taxvaapsi-backend
      dockerfile: Dockerfile
    command: python dummy_portals/gst_portal/app.py
    ports:
      - "8001:8001"
    restart: unless-stopped
    networks:
      - taxvaapsi

  # ── IT PORTAL (Demo) ──────────────────────────────────────────
  it-portal:
    build:
      context: ./taxvaapsi-backend
      dockerfile: Dockerfile
    command: python dummy_portals/it_portal/app.py
    ports:
      - "8002:8002"
    restart: unless-stopped
    networks:
      - taxvaapsi

networks:
  taxvaapsi:
    driver: bridge
